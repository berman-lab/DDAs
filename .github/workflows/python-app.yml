name: Package the DDA Panel Creator with PyInstaller

on:
  push:
    tags:
      - 'v*' # Triggers the build automatically when you push a version tag like v1.0.0
  workflow_dispatch: # Adds the manual "Run workflow" test button

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build Executable with PyInstaller
      run: |
        pyinstaller DDAPanelCreator.spec

    - name: Compress macOS App Bundle (Preserve Symlinks)
      if: matrix.os == 'macos-latest'
      run: |
        cd dist
        zip -r -y "../DDAPanelCreator-${{ github.ref_name }}-macOS.zip" *.app
        cd ..

    - name: Upload Executable Artifact (Windows)
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: DDAPanelCreator-${{ github.ref_name }}-${{ matrix.os }}
        path: |
          dist/*
          !dist/**/*.txt

    - name: Upload Executable Artifact (macOS)
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: DDAPanelCreator-${{ github.ref_name }}-${{ matrix.os }}
        path: DDAPanelCreator-${{ github.ref_name }}-macOS.zip
