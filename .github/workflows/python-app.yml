name: Package the DDA Panel Creator with PyInstaller

on:
  push:
    tags:
      - 'v*' # Triggers the build automatically when you push a version tag like v1.0.0
  workflow_dispatch: # Adds the manual "Run workflow" test button

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build Executable with PyInstaller
      run: |
        pyinstaller DDAPanelCreator.spec

    - name: Upload Executable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DDAPanelCreator-${{ github.ref_name }}-${{ matrix.os }}
        path: |
          dist/*.exe
          dist/*
          !dist/**/*.txt
